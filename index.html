<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --muted: #888;
    --hint: #bbb;
    --event-bg: #fff0f0;
    --event-dot: #e24b4a;
    --event-text: #a32d2d;
    --reminder-bg: #f2f1ee;
    --reminder-dot: #aaa;
    --reminder-text: #5f5e5a;
    --green: #1d9e75;
    --green-bg: #eaf7f1;
    --accent: #1a1a1a;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --card: #1c1c1a;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --muted: #888;
      --hint: #555;
      --event-bg: #2d1818;
      --event-dot: #e24b4a;
      --event-text: #f09595;
      --reminder-bg: #222220;
      --reminder-dot: #666;
      --reminder-text: #b4b2a9;
      --green: #1d9e75;
      --green-bg: #0d2e22;
      --accent: #f0ede8;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 28px 24px 40px;
    min-height: 100vh;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .date-chip {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .day-progress-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .day-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 1s ease;
  }

  .stat-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .stat-pill {
    background: var(--reminder-bg);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .stat-num {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 12px;
  }

  /* ---- TIMELINE ---- */
  .timeline {
    position: relative;
    margin-bottom: 32px;
  }

  .tl-line {
    position: absolute;
    left: 50px;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .tl-item {
    display: flex;
    align-items: flex-start;
    margin-bottom: 8px;
    position: relative;
  }

  .tl-time {
    width: 50px;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    padding-top: 13px;
    text-align: right;
    padding-right: 0;
    letter-spacing: 0.02em;
  }

  .tl-dot-col {
    width: 28px;
    display: flex;
    justify-content: center;
    padding-top: 17px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .tl-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--reminder-dot);
  }

  .tl-dot.event { background: var(--event-dot); }

  .tl-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .tl-name {
    font-size: 14px;
    color: var(--text);
  }

  .tl-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  .tag-event { background: var(--event-bg); color: var(--event-text); }
  .tag-reminder { background: var(--reminder-bg); color: var(--reminder-text); }

  /* NOW line */
  .now-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 6px 0;
    padding-left: 50px;
  }

  .now-dot-space {
    width: 28px;
    display: flex;
    justify-content: center;
  }

  .now-dot-live {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.2);
    flex-shrink: 0;
  }

  .now-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .now-stripe {
    flex: 1;
    height: 1px;
    background: var(--green);
    opacity: 0.3;
  }

  /* ---- UPCOMING GRID ---- */
  .upcoming-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 8px;
  }

  .upcoming-card {
    background: var(--reminder-bg);
    border-radius: 10px;
    padding: 12px 13px;
  }

  .upcoming-date-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }

  .upcoming-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .upcoming-days {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ---- EMPTY / ERROR ---- */
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
  }

  .loading {
    text-align: center;
    color: var(--hint);
    font-size: 13px;
    padding: 60px 0;
    letter-spacing: 0.04em;
  }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  #clock { font-weight: 500; color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <h1>Today</h1>
  <div class="date-chip" id="date-label"></div>
</div>

<div class="day-progress-wrap">
  <div class="day-progress-fill" id="day-bar"></div>
</div>

<div class="stat-row" id="stat-row">
  <div class="stat-pill"><span class="stat-num" id="clock">--:--</span> 现在</div>
</div>

<div id="main-content"><div class="loading">加载中…</div></div>

<script>
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const MONTHS   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function fmtDate(d) {
  return `${d.getFullYear()}年${MONTHS[d.getMonth()]}${d.getDate()}日`;
}

function fmtTime(isoStr) {
  if (!isoStr) return '';
  const t = isoStr.includes('T') ? isoStr.split('T')[1].slice(0,5) : '';
  return t;
}

function daysUntil(isoStr) {
  const target = new Date(isoStr + 'T00:00:00');
  const today  = new Date(); today.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;

  const pct = Math.round(((now.getHours() * 60 + now.getMinutes()) / 1440) * 100);
  document.getElementById('day-bar').style.width = pct + '%';

  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('date-label').textContent =
    WEEKDAYS[today.getDay()] + ' · ' + fmtDate(today);
}

function toMinutes(isoStr) {
  if (!isoStr || !isoStr.includes('T')) return null;
  const [h, m] = isoStr.split('T')[1].split(':');
  return parseInt(h) * 60 + parseInt(m);
}

function render(tasks) {
  const today = new Date().toISOString().split('T')[0];
  const nowMins = new Date().getHours() * 60 + new Date().getMinutes();

  const todayEvents    = tasks.filter(t => t.type === 'Event' && t.start && t.start.startsWith(today));
  const upcomingRemind = tasks.filter(t => t.type === 'Reminder');

  // stat pills
  const statRow = document.getElementById('stat-row');
  statRow.innerHTML = `
    <div class="stat-pill"><span class="stat-num" id="clock">--:--</span> 现在</div>
    <div class="stat-pill"><span class="stat-num">${todayEvents.length}</span> 今日事件</div>
    <div class="stat-pill"><span class="stat-num">${upcomingRemind.length}</span> 待提醒</div>
  `;
  updateClock();

  // build timeline
  let timelineHTML = '';
  let nowInserted = false;

  if (todayEvents.length === 0) {
    timelineHTML = `<div class="empty">今天没有安排的事件 ✦</div>`;
  } else {
    todayEvents.forEach(ev => {
      const mins = toMinutes(ev.start);
      if (!nowInserted && mins !== null && mins > nowMins) {
        nowInserted = true;
        timelineHTML += `
          <div class="now-row">
            <div class="now-dot-space"><div class="now-dot-live"></div></div>
            <span class="now-label">现在</span>
            <div class="now-stripe"></div>
          </div>`;
      }
      const time = fmtTime(ev.start);
      const tagClass = ev.type === 'Event' ? 'tag-event' : 'tag-reminder';
      const dotClass = ev.type === 'Event' ? 'event' : '';
      timelineHTML += `
        <div class="tl-item">
          <div class="tl-time">${time}</div>
          <div class="tl-dot-col"><div class="tl-dot ${dotClass}"></div></div>
          <div class="tl-card">
            <div class="tl-name">${ev.name}</div>
            <span class="tl-tag ${tagClass}">${ev.type}</span>
          </div>
        </div>`;
    });
    if (!nowInserted) {
      timelineHTML += `
        <div class="now-row">
          <div class="now-dot-space"><div class="now-dot-live"></div></div>
          <span class="now-label">现在</span>
          <div class="now-stripe"></div>
        </div>`;
    }
  }

  // build upcoming
  let upcomingHTML = '';
  if (upcomingRemind.length === 0) {
    upcomingHTML = `<div class="empty" style="padding:20px 0">暂无近期提醒</div>`;
  } else {
    upcomingRemind.slice(0, 12).forEach(r => {
      const d = daysUntil(r.start.split('T')[0]);
      const dateStr = (() => {
        const dt = new Date(r.start.split('T')[0] + 'T00:00:00');
        return `${MONTHS[dt.getMonth()]}${dt.getDate()}日`;
      })();
      const daysLabel = d === 0 ? '今天' : d === 1 ? '明天' : `还有 ${d} 天`;
      upcomingHTML += `
        <div class="upcoming-card">
          <div class="upcoming-date-label">${dateStr}</div>
          <div class="upcoming-name">${r.name}</div>
          <div class="upcoming-days">${daysLabel}</div>
        </div>`;
    });
  }

  document.getElementById('main-content').innerHTML = `
    <div class="section-title">今日日程</div>
    <div class="timeline">
      <div class="tl-line"></div>
      ${timelineHTML}
    </div>
    <hr class="divider" />
    <div class="section-title">即将到来</div>
    <div class="upcoming-grid">${upcomingHTML}</div>
  `;
}

async function fetchTasks() {
  try {
    const res = await fetch('/api/tasks');
    if (!res.ok) throw new Error('API error ' + res.status);
    const { tasks } = await res.json();
    render(tasks);
  } catch (e) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty">⚠ 加载失败：${e.message}<br><small>请确认 NOTION_TOKEN 和 DATABASE_ID 已配置</small></div>`;
  }
}

updateClock();
setInterval(updateClock, 30000);
fetchTasks();
// 每5分钟自动刷新
setInterval(fetchTasks, 5 * 60 * 1000);
</script>
</body>
</html>
